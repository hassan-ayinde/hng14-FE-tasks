<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Single Card Component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section
      role="region"
      class="card-container"
      data-testid="data-todo-card"
    >
      <div class="task-badge">
        <span
          data-testid="test-todo-priority"
          class="task-priority"
          aria-label="task-priority"
          >high</span
        >
        <div class="task-status-wrapper">
          <span class="task-status"></span>
          <span data-testid="test-todo-status" aria-label="task-status"
            >pending</span
          >
        </div>
      </div>
      <div class="task-content-body">
        <div>
          <h2 data-testid="test-todo-title">implement oAuth2 flow</h2>
          <div data-testid="test-todo-collapsible-section">
            <p data-testid="test-todo-description" class="task-description">
              Implement OAuth2 flow for the application to allow users to
              authenticate using their social media accounts.
            </p>
            <button type="button" data-testid="test-todo-expand-toggle">
              view more
            </button>
          </div>
        </div>
        <div class="task-action-btns">
          <button
            type="button"
            title="Edit Task"
            data-testid="test-todo-edit-button"
            aria-label="edit button"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
            >
              <path
                fill="535B71"
                d="M18.58 2.944a2 2 0 0 0-2.828 0L14.107 4.59l5.303 5.303l1.645-1.644a2 2 0 0 0 0-2.829zm-.584 8.363l-5.303-5.303l-8.835 8.835l-1.076 6.38l6.38-1.077z"
              />
            </svg>
          </button>
          <button
            type="button"
            title="Delete Task"
            data-testid="test-todo-delete-button"
            aria-label="delete button"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
            >
              <path
                fill="#B80438"
                d="M7 21q-.825 0-1.412-.587T5 19V6q-.425 0-.712-.288T4 5t.288-.712T5 4h4q0-.425.288-.712T10 3h4q.425 0 .713.288T15 4h4q.425 0 .713.288T20 5t-.288.713T19 6v13q0 .825-.587 1.413T17 21zM17 6H7v13h10zm-6.287 10.713Q11 16.425 11 16V9q0-.425-.288-.712T10 8t-.712.288T9 9v7q0 .425.288.713T10 17t.713-.288m4 0Q15 16.426 15 16V9q0-.425-.288-.712T14 8t-.712.288T13 9v7q0 .425.288.713T14 17t.713-.288M7 6v13z"
              />
            </svg>
          </button>
        </div>
      </div>
      <div class="task-tag-container">
        <ul role="list" data-testid="test-todo-tags" class="task-tag-wrapper">
          <li data-testid="data-test-security">#security</li>
          <li data-testid="data-test-backend">#backend</li>
          <li data-testid="data-test-auth">#auth</li>
        </ul>
      </div>
      <div class="task-completion">
        <input
          type="checkbox"
          name="complete"
          id="complete"
          data-testid="test-todo-complete-toggle"
        />
        <label for="complete">Mark as complete</label>
      </div>

      <div class="task-time">
        <div>
          <h3>deadline</h3>
          <div class="task-deadline">
            <span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="15"
                height="15"
                viewBox="0 0 24 24"
              >
                <path
                  fill="#0052FF"
                  d="M19 4h-2V3a1 1 0 0 0-2 0v1H9V3a1 1 0 0 0-2 0v1H5a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3m1 15a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-7h16Zm0-9H4V7a1 1 0 0 1 1-1h2v1a1 1 0 0 0 2 0V6h6v1a1 1 0 0 0 2 0V6h2a1 1 0 0 1 1 1Z"
                />
              </svg>
            </span>
            <time datetime="2026-04-16" data-testid="test-todo-due-date"
              >due april 16, 2026</time
            >
          </div>
        </div>
        <div>
          <div>
            <h3>timeframe</h3>
            <sup data-testid="test-todo-overdue-indicator">overdue</sup>
          </div>

          <div class="task-timeframe">
            <span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="15"
                height="15"
                viewBox="0 0 24 24"
              >
                <path
                  fill="#B80438"
                  d="M12 23C5.925 23 1 18.075 1 12S5.925 1 12 1s11 4.925 11 11s-4.925 11-11 11m1-17.5h-2v6.914l4 4L16.414 15L13 11.586z"
                />
              </svg>
            </span>
            <time data-testid="test-todo-time-remaining"
              >overdue by 2 hours</time
            >
          </div>
        </div>
      </div>
    </section>

    <!-- EDIT MODE (hidden by default) -->
    <div class="task-edit-form-wrapper view-card">
      <form action="" data-testid="test-todo-edit-form">
        <div>
          <label for="task_title">task title</label>
          <input
            type="text"
            name=""
            id="task_title"
            data-testid="test-todo-edit-title-input"
          />
        </div>
        <div>
          <label for="task_description">description</label>
          <textarea
            name=""
            rows="5"
            id="task_description"
            data-testid="test-todo-edit-description-input"
          ></textarea>
        </div>
        <div class="task-indicator-container">
          <div class="task-priority-dropdown">
            <label for="task_priority">priority level</label>
            <select
              name=""
              id="task_priority"
              data-testid="test-todo-edit-priority-select"
            >
              <option value="high">high</option>
              <option value="medium">medium</option>
              <option value="low">low</option>
            </select>
          </div>
          <div class="task-status-dropdown">
            <div data-testid="test-todo-priority-indicator"></div>
            <label for="task_status">status</label>
            <select
              name="task_status"
              id="task_status"
              data-testid="test-todo-status-control"
            >
              <option value="">done</option>
              <option value="">pending</option>
              <option value="">in progress</option>
            </select>
          </div>
        </div>
        <div>
          <label for="task_due_date">due date</label>
          <input
            type="date"
            name=""
            id="task_due_date"
            data-testid="test-todo-edit-due-date-input"
          />
        </div>
        <div class="action-btns">
          <button type="button" data-testid="test-todo-cancel-button">
            cancel
          </button>
          <button type="button" data-testid="test-todo-save-button">
            save changes
          </button>
        </div>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
